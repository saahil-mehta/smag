<!doctype html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Santosh Magnetic Works | Coming soon</title>
  <meta name="description" content="A new site for Santosh Magnetic Works is on the way. Magnetic separation, lifting and work-holding equipment, Mumbai, since 1978.">
  <meta name="robots" content="noindex">

  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png">
  <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">

  <meta property="og:type" content="website">
  <meta property="og:title" content="Santosh Magnetic Works | Coming soon">
  <meta property="og:description" content="A new site is on the way. Magnetic separation, lifting and work-holding equipment, Mumbai, since 1978.">

  <style>
    :root {
      --ink: #130f26;
      --red: #e8231a;
      --paper: #f5f4f3;
      --muted: #6b6770;
      --hairline: rgba(19, 15, 38, 0.12);
    }

    * { box-sizing: border-box; }

    html, body { height: 100%; }

    body {
      margin: 0;
      background: var(--paper);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      display: flex;
      flex-direction: column;
      min-height: 100%;
      position: relative;
      overflow-x: hidden;
    }

    /* Magnetic field lines: the one context-specific detail. */
    .field {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      opacity: 0.5;
    }
    .field svg { width: 100%; height: 100%; }
    .field path {
      fill: none;
      stroke: var(--red);
      stroke-width: 1;
      opacity: 0.18;
    }

    main {
      position: relative;
      z-index: 1;
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 7vh 24px;
      gap: 30px;
    }

    .logo {
      width: min(340px, 72vw);
      height: auto;
      opacity: 0;
      animation: rise 0.9s cubic-bezier(0.2, 0.7, 0.2, 1) 0.05s forwards;
    }

    .eyebrow {
      margin: 0;
      font-size: 0.72rem;
      letter-spacing: 0.34em;
      text-transform: uppercase;
      font-weight: 600;
      color: var(--red);
      opacity: 0;
      animation: rise 0.9s cubic-bezier(0.2, 0.7, 0.2, 1) 0.22s forwards;
    }

    h1 {
      margin: 0;
      max-width: 18ch;
      font-size: clamp(1.9rem, 5.5vw, 3.1rem);
      line-height: 1.08;
      font-weight: 700;
      letter-spacing: -0.02em;
      opacity: 0;
      animation: rise 0.9s cubic-bezier(0.2, 0.7, 0.2, 1) 0.34s forwards;
    }

    .lede {
      margin: 0;
      max-width: 46ch;
      font-size: clamp(1rem, 2.4vw, 1.16rem);
      line-height: 1.6;
      color: var(--muted);
      opacity: 0;
      animation: rise 0.9s cubic-bezier(0.2, 0.7, 0.2, 1) 0.46s forwards;
    }

    .rule {
      width: 56px;
      height: 3px;
      background: var(--red);
      border: 0;
      margin: 4px 0 0;
      opacity: 0;
      animation: rise 0.9s cubic-bezier(0.2, 0.7, 0.2, 1) 0.4s forwards;
    }

    footer {
      position: relative;
      z-index: 1;
      padding: 26px 24px;
      border-top: 1px solid var(--hairline);
      text-align: center;
      font-size: 0.74rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
      opacity: 0;
      animation: rise 0.9s cubic-bezier(0.2, 0.7, 0.2, 1) 0.6s forwards;
    }
    footer span { white-space: nowrap; }
    footer .dot { color: var(--red); margin: 0 0.5em; }

    @keyframes rise {
      from { opacity: 0; transform: translateY(14px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      .logo, .eyebrow, h1, .lede, .rule, footer { animation: none; opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="field" aria-hidden="true">
    <svg viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice">
      <path d="M600 400 C 600 120, 900 120, 1000 400 C 900 680, 600 680, 600 400 Z" />
      <path d="M600 400 C 600 40, 1040 40, 1160 400 C 1040 760, 600 760, 600 400 Z" />
      <path d="M600 400 C 600 200, 800 200, 860 400 C 800 600, 600 600, 600 400 Z" />
      <path d="M600 400 C 600 120, 300 120, 200 400 C 300 680, 600 680, 600 400 Z" />
      <path d="M600 400 C 600 40, 160 40, 40 400 C 160 760, 600 760, 600 400 Z" />
      <path d="M600 400 C 600 200, 400 200, 340 400 C 400 600, 600 600, 600 400 Z" />
    </svg>
  </div>

  <main>
    <img class="logo" src="/assets/logo.svg" alt="Santosh Magnetic Works" width="560" height="180">
    <p class="eyebrow">Coming soon</p>
    <h1>A new home for Santosh Magnetic Works is on the way.</h1>
    <hr class="rule">
    <p class="lede">We are rebuilding our website. Magnetic separation, lifting and work-holding equipment, engineered in Mumbai since 1978. Please check back shortly.</p>
  </main>

  <footer>
    <span>Santosh Magnetic Works</span><span class="dot">&middot;</span><span>Mumbai, India</span><span class="dot">&middot;</span><span>Est. 1978</span>
  </footer>
</body>
</html>
