<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 150" role="img" aria-labelledby="t d">
  <title id="t">Matched magnet circuit</title>
  <desc id="d">A horseshoe magnet with pulsing field lines attracting ferrous particles.</desc>
  <g fill="none" stroke="#e8231a" stroke-linecap="round" stroke-width="2.6">
    <path d="M100 72 Q130 24 160 72"><animate attributeName="opacity" values=".12;.95;.12" dur="2.6s" begin="0s" repeatCount="indefinite"/></path>
    <path d="M105 70 Q130 36 155 70"><animate attributeName="opacity" values=".12;.95;.12" dur="2.6s" begin=".5s" repeatCount="indefinite"/></path>
    <path d="M110 68 Q130 47 150 68"><animate attributeName="opacity" values=".12;.95;.12" dur="2.6s" begin="1s" repeatCount="indefinite"/></path>
  </g>
  <circle r="3.6" fill="#1a1a1a" opacity="0">
    <animate attributeName="cx" values="34;98" dur="2.8s" begin="0s" repeatCount="indefinite" keyTimes="0;1" calcMode="spline" keySplines="0.4 0 0.2 1"/>
    <animate attributeName="cy" values="128;84" dur="2.8s" begin="0s" repeatCount="indefinite" keyTimes="0;1" calcMode="spline" keySplines="0.4 0 0.2 1"/>
    <animate attributeName="opacity" values="0;.9;0" dur="2.8s" begin="0s" repeatCount="indefinite"/>
  </circle>
  <circle r="3.6" fill="#1a1a1a" opacity="0">
    <animate attributeName="cx" values="226;162" dur="2.8s" begin="1.4s" repeatCount="indefinite" keyTimes="0;1" calcMode="spline" keySplines="0.4 0 0.2 1"/>
    <animate attributeName="cy" values="120;84" dur="2.8s" begin="1.4s" repeatCount="indefinite" keyTimes="0;1" calcMode="spline" keySplines="0.4 0 0.2 1"/>
    <animate attributeName="opacity" values="0;.9;0" dur="2.8s" begin="1.4s" repeatCount="indefinite"/>
  </circle>
  <path d="M100 78 L100 106 Q100 130 130 130 Q160 130 160 106 L160 78" fill="none" stroke="#1a1a1a" stroke-width="16" stroke-linejoin="round"/>
  <rect x="92" y="66" width="16" height="14" fill="#e8231a"/>
  <rect x="152" y="66" width="16" height="14" fill="#1a1a1a"/>
</svg>
